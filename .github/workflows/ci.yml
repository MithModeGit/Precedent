name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Type Check, Lint, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create CI environment file
        run: |
          echo "GOOGLE_GENERATIVE_AI_API_KEY=ci-placeholder" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-placeholder-anon-key" >> .env.local

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
